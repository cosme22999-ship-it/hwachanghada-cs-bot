name: Deploy to Hugging Face Space

on:
  push:
    branches:
      - main
  workflow_dispatch:  # 수동 실행도 가능

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with LFS)
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0  # 전체 히스토리 (LFS pointer 해결)

      - name: Pull LFS files
        run: git lfs pull

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USER: mmmaadfdf
          HF_SPACE: hwachanghada-cs-bot
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "❌ HF_TOKEN secret이 설정되지 않았습니다"
            echo "GitHub repo의 Settings → Secrets → Actions 에서 HF_TOKEN 추가하세요"
            exit 1
          fi

          git config user.email "ci@hwachanghada.local"
          git config user.name "CS봇 CI"
          git lfs install

          # 깨끗한 단일 커밋(orphan)으로 force push (HF history 단순화)
          git checkout --orphan hf-deploy
          git add -A
          git commit -m "CI auto-deploy from GitHub Actions"

          git push -f "https://${HF_USER}:${HF_TOKEN}@huggingface.co/spaces/${HF_USER}/${HF_SPACE}.git" hf-deploy:main

          echo "✅ HF Space에 자동 배포 완료"
